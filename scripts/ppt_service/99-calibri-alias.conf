<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Map Microsoft Office fonts to their metric-compatible open-source equivalents.
  This ensures LibreOffice renders PPTX slides with correct spacing, line-breaks,
  and layout — matching how PowerPoint would display them.
-->
<fontconfig>
  <!-- Calibri → Carlito (same metrics, Google CrOS font) -->
  <alias binding="same">
    <family>Calibri</family>
    <prefer><family>Carlito</family></prefer>
  </alias>

  <!-- Cambria → Caladea -->
  <alias binding="same">
    <family>Cambria</family>
    <prefer><family>Caladea</family></prefer>
  </alias>

  <!-- Arial → Liberation Sans (same metrics) -->
  <alias binding="same">
    <family>Arial</family>
    <prefer><family>Liberation Sans</family></prefer>
  </alias>

  <!-- Times New Roman → Liberation Serif -->
  <alias binding="same">
    <family>Times New Roman</family>
    <prefer><family>Liberation Serif</family></prefer>
  </alias>

  <!-- Courier New → Liberation Mono -->
  <alias binding="same">
    <family>Courier New</family>
    <prefer><family>Liberation Mono</family></prefer>
  </alias>
</fontconfig>
